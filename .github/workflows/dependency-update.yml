name: Dependency Update

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-go-dependencies:
    name: Update Go Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract Go version from go.mod
      id: go-version
      working-directory: ./backend
      run: |
        GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
        echo "version=$GO_VERSION" >> $GITHUB_OUTPUT
        echo "Using Go version: $GO_VERSION"

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ steps.go-version.outputs.version }}

    - name: Update Go dependencies
      working-directory: ./backend
      run: |
        go get -u ./...
        go mod tidy

    - name: Run tests
      working-directory: ./backend
      run: go test ./...

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Go dependencies'
        title: 'chore: update Go dependencies'
        body: |
          This PR updates Go dependencies to their latest versions.
          
          Please review the changes and ensure all tests pass before merging.
        branch: chore/update-go-dependencies
        delete-branch: true

  update-npm-dependencies:
    name: Update NPM Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract Node version from package.json
      id: node-version
      working-directory: ./frontend
      run: |
        NODE_VERSION=$(jq -r '.engines.node' package.json | sed 's/>=//; s/\^//')
        echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
        echo "Using Node version: $NODE_VERSION"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.node-version.outputs.version }}

    - name: Update NPM dependencies
      working-directory: ./frontend
      run: |
        npm update
        npm audit fix --force

    - name: Run tests
      working-directory: ./frontend
      run: |
        npm run lint
        npm test --if-present
        npm run build

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update NPM dependencies'
        title: 'chore: update NPM dependencies'
        body: |
          This PR updates NPM dependencies to their latest versions.
          
          Please review the changes and ensure all tests pass before merging.
        branch: chore/update-npm-dependencies
        delete-branch: true

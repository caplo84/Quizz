server:
  port: "8080"
  environment: "development"
  gin_mode: "debug"
  read_timeout: "30s"
  write_timeout: "30s"

database:
  host: "postgres"
  port: "5432"
  user: "quiz_user"
  password: "dev_password"
  dbname: "quiz_db_dev"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 25
  conn_max_lifetime: "1h"

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

logging:
  level: "debug"
  format: "text"
  output: "stdout"

security:
  admin_api_key: "dev_admin_key"
  jwt_secret: "dev_jwt_secret"
  rate_limit_rps: 100

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Request-ID"

cache:
  ttl_seconds: 300
  cleanup_interval: "10m"

github:
  token: "${GITHUB_TOKEN}"
  owner: "linkedin"
  repository: "linkedin-skill-assessments-quizzes"
  base_url: "https://api.github.com"
  rate_limit_per_hour: 5000
  sync_interval: "1h"
  categories:
    - "javascript"
    - "python"
    - "go"
    - "java"

features:
  enable_metrics: true
  enable_debug_routes: true
  enable_profiling: true
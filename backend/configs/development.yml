server:
  port: "8080"
  environment: "development"
  gin_mode: "debug"
  read_timeout: "30s"
  write_timeout: "30s"

database:
  host: "localhost"
  port: "5432"
  user: "quiz_user"
  password: "dev_password"
  dbname: "quiz_db_dev"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 25
  conn_max_lifetime: "1h"

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

logging:
  level: "debug"
  format: "text"
  output: "stdout"

security:
  admin_api_key: "dev_admin_key"
  jwt_secret: "dev_jwt_secret"
  rate_limit_rps: 100

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Request-ID"

cache:
  ttl_seconds: 300
  cleanup_interval: "10m"

features:
  enable_metrics: true
  enable_debug_routes: true
  enable_profiling: true
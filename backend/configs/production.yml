server:
  port: "8080"
  environment: "production"
  gin_mode: "release"
  read_timeout: "30s"
  write_timeout: "30s"

database:
  host: "${DB_HOST}"
  port: "${DB_PORT}"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  dbname: "${DB_NAME}"
  sslmode: "require"
  max_idle_conns: 20
  max_open_conns: 100
  conn_max_lifetime: "4h"

redis:
  host: "${REDIS_HOST}"
  port: "${REDIS_PORT}"
  password: "${REDIS_PASSWORD}"
  db: 0
  pool_size: 50
  min_idle_conns: 20

logging:
  level: "warn"
  format: "json"
  output: "stdout"

security:
  admin_api_key: "${ADMIN_API_KEY}"
  jwt_secret: "${JWT_SECRET}"
  rate_limit_rps: 25

cors:
  allowed_origins:
    - "${FRONTEND_URL}"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Request-ID"

cache:
  ttl_seconds: 1800
  cleanup_interval: "30m"

features:
  enable_metrics: true
  enable_debug_routes: false
  enable_profiling: false